spring.application.name=gateway
server.port=8080

spring.cloud.gateway.server.webmvc.routes[0].id=ms-libros_route
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/libros/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[1].id=ms-prestamos_route
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/prestamos/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

management.endpoints.web.exposure.include=health,info,metrics

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/biblioteca-realm